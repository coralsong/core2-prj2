<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lamp Slider</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <main class="dashboard">
        <div class="slider-widget">
            <div class="lamp-mount">
                <img src="../folder 3/assets/4.svg" alt="Lamp Top" class="lamp-top" draggable="false">
            </div>
            
            <div class="lamp-string-wrapper" id="stringHitbox">
                <div class="lamp-string-container" id="stringContainer">
                    <img src="../folder 3/assets/1.svg" class="string-img active" id="state1" draggable="false">
                    <img src="../folder 3/assets/2.svg" class="string-img" id="state2" draggable="false">
                    <img src="../folder 3/assets/3.svg" class="string-img" id="state3" draggable="false">
                </div>
            </div>
        </div>
    </main>

    <script src="script.js"></script>
</body>
</html>
