<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lamp Slider</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <main class="dashboard">
        <div class="slider1">
            <div class="lamp-mount">
                <img src="../assets/4.svg" alt="Lamp Top" class="lamp-top" draggable="false">
            </div>
            
            <div class="lamp-string-wrapper" id="stringHitbox">
                <div class="lamp-string-container" id="stringContainer">
                    <img src="../assets/1.svg" class="string-img active" id="state1" draggable="false">
                    <img src="../assets/2.svg" class="string-img" id="state2" draggable="false">
                    <img src="../assets/3.svg" class="string-img" id="state3" draggable="false">
                </div>
            </div>
        </div>

        <div class="slider2" id="slider2">
            <div class="sun">
                <img src="../assets/2-1.svg" class="toggle-img active" id="sunImg" draggable="false">
            </div>
            
            <div class="moon">
                    <img src="../assets/2-2.svg" class="toggle-img" id="moonImg" draggable="false">
            </div>
        </div>

        <div class="slider3" id="slider3">
            <div class="apple">
                <img src="../assets/apple.svg" class="toggle-apple active" id="apple" draggable="false">
            </div>

             <div class="apple3">
                <img src="../assets/apple 3.svg" class="toggle-apple" id="apple3" draggable="false">
            </div>


        </div>
    </main>

    <script src="script.js"></script>
</body>
</html>
